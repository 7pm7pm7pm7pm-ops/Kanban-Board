<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kanban Board - ระบบรับคำสั่งผลิต</title>
<style>
  :root {
    --bg-page: #f4f3ee;
    --bg-primary: #ffffff;
    --bg-secondary: #eceae1;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-danger: #a32d2d;
    --border-tertiary: rgba(0,0,0,0.12);
    --border-secondary: rgba(0,0,0,0.22);
    --border-info: #378add;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", "Noto Sans Thai", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-page);
    color: var(--text-primary);
    margin: 0;
    padding: 14px;
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
  }
  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    height: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ---------- โซนหัว: กระชับ ไม่มี scroll ---------- */
  .top-zone { flex: 0 0 auto; }

  .header-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .header-row h1 { font-size: 18px; font-weight: 500; margin: 0; }
  .header-row .sub { font-size: 12px; color: var(--text-secondary); margin: 0; }

  .control-bar {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 10px 12px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-wrap: wrap;
  }
  .field { display: flex; flex-direction: column; }
  .field label {
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 3px;
  }
  input, select, button {
    font-family: var(--font-sans);
    font-size: 13px;
    padding: 6px 9px;
    border: 0.5px solid var(--border-secondary);
    border-radius: var(--radius-md);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 32px;
  }
  button { cursor: pointer; transition: background 0.12s, transform 0.05s; }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  input:focus, select:focus { outline: none; box-shadow: 0 0 0 2px var(--border-info); }

  .stat-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .stat-pill {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .stat-pill b {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    margin-left: 4px;
  }
  .sort-group { display: flex; gap: 6px; align-items: center; margin-left: auto; flex-wrap: wrap; }
  .sort-group span { font-size: 12px; color: var(--text-secondary); }

  /* ---------- โซน board: กินพื้นที่ที่เหลือ ---------- */
  .board-zone {
    flex: 1 1 auto;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .kb-col {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: 10px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .kb-col-head {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
    padding: 0 2px;
  }
  .kb-col-body {
    flex: 1 1 auto;
    overflow-y: auto;
    min-height: 0;
    padding-right: 2px;
  }
  .kb-col-body::-webkit-scrollbar { width: 8px; }
  .kb-col-body::-webkit-scrollbar-thumb {
    background: var(--border-secondary);
    border-radius: 4px;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="top-zone">

    <div class="header-row">
      <h1>Kanban Board — ระบบรับคำสั่งผลิต</h1>
      <p class="sub">รับคำสั่งจากลูกค้า · 3 Production (รถ / ร้านค้า / กล้อง) · เรียงการผลิตเป็นกลุ่มตาม Production</p>
    </div>

    <div class="control-bar">
      <div class="field" style="min-width:150px;">
        <label>ชื่อลูกค้า</label>
        <select id="in-cust">
          <option value="อาจารย์ปู">อาจารย์ปู</option>
          <option value="__new__">+ เพิ่มลูกค้าใหม่</option>
        </select>
      </div>
      <div class="field" id="newcust-wrap" style="display:none;min-width:150px;">
        <label>ชื่อลูกค้าใหม่</label>
        <input type="text" id="in-newcust" placeholder="พิมพ์ชื่อลูกค้า" />
      </div>
      <div class="field" style="min-width:150px;">
        <label>Production</label>
        <select id="in-prod">
          <option value="CAR">1 · รถ (CAR)</option>
          <option value="STORE">2 · ร้านค้า (STORE)</option>
          <option value="CAMERA">3 · กล้อง (CAMERA)</option>
        </select>
      </div>
      <div class="field" style="width:80px;">
        <label>จำนวน</label>
        <input type="number" id="in-qty" min="1" value="1" />
      </div>
      <button id="btn-add">+ เพิ่มคำสั่ง</button>
      <span style="font-size:11px;color:var(--text-tertiary);align-self:center;max-width:160px;">กรอกหลายชิ้น ระบบแตกเป็นการ์ดแยกใบให้</span>
    </div>

    <div class="stat-row" style="margin-top:8px;">
      <div class="stat-pill">ออเดอร์ทั้งหมด<b id="st-total">0</b></div>
      <div class="stat-pill">ผลิตเสร็จ<b id="st-done">0 / 0</b></div>
      <div class="stat-pill" id="st-prod">รถ 0 · ร้านค้า 0 · กล้อง 0</div>
      <div class="sort-group">
        <span>เรียง To Do:</span>
        <button id="btn-sort-prod" style="font-size:12px;">กลุ่ม Production</button>
        <button id="btn-sort-fifo" style="font-size:12px;">FIFO</button>
        <button id="btn-reset" style="font-size:12px;color:var(--text-danger);">ล้างข้อมูล</button>
      </div>
    </div>

  </div>

  <div class="board-zone" id="board"></div>

</div>

<script>
(function(){
  var COLS = [
    {key:'todo',   label:'To Do',  hint:'รอผลิต'},
    {key:'doing',  label:'Doing',  hint:'กำลังผลิต'},
    {key:'done',   label:'Done',   hint:'ผลิตเสร็จ'}
  ];
  var PROD_ORDER = ['CAR','STORE','CAMERA'];
  var PROD = {
    CAR:    {name:'รถ',     code:'CAR',    rank:1, ramp:'c-blue'},
    STORE:  {name:'ร้านค้า', code:'STORE',  rank:2, ramp:'c-green'},
    CAMERA: {name:'กล้อง',   code:'CAMERA', rank:3, ramp:'c-purple'}
  };
  var RAMP = {
    'c-blue':   {bg:'#E6F1FB', tx:'#0C447C'},
    'c-green':  {bg:'#EAF3DE', tx:'#27500A'},
    'c-purple': {bg:'#EEEDFE', tx:'#3C3489'}
  };
  var KEY = 'kanban_orders_web_v3';
  var state = {orders:[], seq:1, sortMode:'prod', customers:['อาจารย์ปู']};

  function save(){
    try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
  }
  function load(){
    try {
      var raw = localStorage.getItem(KEY);
      if(raw){ state = JSON.parse(raw); }
    } catch(e){}
  }

  function orderNo(n){ return 'Order ' + String(n).padStart(3,'0'); }

  function sortTodo(list){
    var copy = list.slice();
    if(state.sortMode === 'prod'){
      copy.sort(function(a,b){
        if(PROD[a.prod].rank !== PROD[b.prod].rank) return PROD[a.prod].rank - PROD[b.prod].rank;
        return a.seq - b.seq;
      });
    } else {
      copy.sort(function(a,b){ return a.seq - b.seq; });
    }
    return copy;
  }

  function refreshCustOptions(){
    var sel = document.getElementById('in-cust');
    var cur = sel.value;
    var html = '';
    state.customers.forEach(function(c){ html += '<option value="'+c+'">'+c+'</option>'; });
    html += '<option value="__new__">+ เพิ่มลูกค้าใหม่</option>';
    sel.innerHTML = html;
    if(cur && cur!=='__new__' && state.customers.indexOf(cur)>=0) sel.value = cur;
  }

  function renderStats(){
    var totalOrders = state.orders.length;
    var doneCount = state.orders.filter(function(o){return o.col==='done';}).length;
    var byProd = {}; PROD_ORDER.forEach(function(k){ byProd[k]=0; });
    state.orders.forEach(function(o){ byProd[o.prod] += 1; });
    document.getElementById('st-total').textContent = totalOrders + ' ชิ้น';
    document.getElementById('st-done').textContent = doneCount + ' / ' + totalOrders + ' ชิ้น';
    document.getElementById('st-prod').textContent =
      PROD_ORDER.map(function(k){ return PROD[k].name + ' ' + byProd[k]; }).join(' · ');
  }

  function cardHTML(o, idx, showGroupHead){
    var p = PROD[o.prod];
    var r = RAMP[p.ramp];
    var head = '';
    if(showGroupHead){
      head = '<div style="font-size:11px;font-weight:500;color:'+r.tx+';background:'+r.bg+';'+
        'padding:3px 9px;border-radius:var(--radius-md);margin:4px 0 8px;display:inline-block;">'+
        'กลุ่ม '+p.rank+' · '+p.name+'</div>';
    }
    var orderTag = state.sortMode==='prod' && o.col==='todo'
      ? '<span style="font-size:11px;color:var(--text-tertiary);">ลำดับผลิต #'+(idx+1)+'</span>' : '';
    return head + '<div class="kb-card" draggable="true" data-id="'+o.id+'" '+
      'style="background:var(--bg-primary);border:0.5px solid var(--border-tertiary);'+
      'border-radius:var(--radius-md);padding:10px 12px;margin-bottom:8px;cursor:grab;">'+
      '<div style="display:flex;justify-content:space-between;align-items:baseline;">'+
        '<span style="font-size:14px;font-weight:500;">'+orderNo(o.seq)+'</span>'+
        '<span style="font-size:12px;background:'+r.bg+';color:'+r.tx+';padding:3px 9px;border-radius:var(--radius-md);font-weight:500;">'+p.name+' '+o.unit+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--text-secondary);margin-top:3px;">'+o.cust+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">'+
        '<span style="font-size:12px;color:var(--text-tertiary);">Production</span>'+
        '<span style="font-size:13px;font-weight:500;">'+p.name+' '+o.unit+'</span>'+
      '</div>'+
      (orderTag ? '<div style="margin-top:6px;">'+orderTag+'</div>' : '')+
      '<div style="margin-top:8px;display:flex;gap:6px;">'+
        moveBtns(o)+
        '<button data-del="'+o.id+'" style="font-size:11px;padding:3px 8px;margin-left:auto;color:var(--text-danger);height:auto;">ลบ</button>'+
      '</div>'+
    '</div>';
  }

  function moveBtns(o){
    var ci = COLS.findIndex(function(c){return c.key===o.col;});
    var out = '';
    if(ci > 0) out += '<button data-move="'+o.id+'" data-dir="-1" style="font-size:11px;padding:3px 8px;height:auto;">←</button>';
    if(ci < COLS.length-1) out += '<button data-move="'+o.id+'" data-dir="1" style="font-size:11px;padding:3px 8px;height:auto;">→</button>';
    return out;
  }

  function render(){
    renderStats();
    var board = document.getElementById('board');
    board.innerHTML = '';
    COLS.forEach(function(c){
      var list = state.orders.filter(function(o){return o.col===c.key;});
      if(c.key==='todo') list = sortTodo(list);
      var col = document.createElement('div');
      col.className = 'kb-col';
      col.dataset.col = c.key;

      var bodyInner = '';
      if(list.length===0){
        bodyInner = '<div style="font-size:12px;color:var(--text-tertiary);text-align:center;padding:20px 0;">ลากการ์ดมาวางที่นี่</div>';
      } else {
        var lastProd = null;
        var groupMode = (c.key==='todo' && state.sortMode==='prod');
        list.forEach(function(o,i){
          var showHead = groupMode && o.prod !== lastProd;
          lastProd = o.prod;
          bodyInner += cardHTML(o,i,showHead);
        });
      }

      col.innerHTML =
        '<div class="kb-col-head">'+
          '<span style="font-size:14px;font-weight:500;">'+c.label+' ('+list.length+')</span>'+
          '<span style="font-size:11px;color:var(--text-tertiary);">'+c.hint+'</span>'+
        '</div>'+
        '<div class="kb-col-body">'+bodyInner+'</div>';
      board.appendChild(col);
    });
    bindCards();
  }

  function bindCards(){
    document.querySelectorAll('.kb-card').forEach(function(card){
      card.addEventListener('dragstart', function(e){
        e.dataTransfer.setData('text/plain', card.dataset.id);
        card.style.opacity = '0.4';
      });
      card.addEventListener('dragend', function(){ card.style.opacity='1'; });
    });
    document.querySelectorAll('.kb-col').forEach(function(col){
      col.addEventListener('dragover', function(e){ e.preventDefault();
        col.style.outline = '2px dashed var(--border-info)'; });
      col.addEventListener('dragleave', function(){ col.style.outline='none'; });
      col.addEventListener('drop', function(e){
        e.preventDefault(); col.style.outline='none';
        var id = e.dataTransfer.getData('text/plain');
        var o = state.orders.find(function(x){return x.id===id;});
        if(o){ o.col = col.dataset.col; save(); render(); }
      });
    });
    document.querySelectorAll('[data-move]').forEach(function(b){
      b.addEventListener('click', function(){
        var o = state.orders.find(function(x){return x.id===b.dataset.move;});
        var ci = COLS.findIndex(function(c){return c.key===o.col;});
        var ni = ci + parseInt(b.dataset.dir,10);
        if(ni>=0 && ni<COLS.length){ o.col = COLS[ni].key; save(); render(); }
      });
    });
    document.querySelectorAll('[data-del]').forEach(function(b){
      b.addEventListener('click', function(){
        state.orders = state.orders.filter(function(x){return x.id!==b.dataset.del;});
        save(); render();
      });
    });
  }

  document.getElementById('in-cust').addEventListener('change', function(){
    var wrap = document.getElementById('newcust-wrap');
    wrap.style.display = (this.value === '__new__') ? 'flex' : 'none';
  });

  document.getElementById('btn-add').addEventListener('click', function(){
    var custSel = document.getElementById('in-cust').value;
    var cust;
    if(custSel === '__new__'){
      cust = document.getElementById('in-newcust').value.trim();
      if(!cust){ alert('กรุณาพิมพ์ชื่อลูกค้าใหม่'); return; }
      if(state.customers.indexOf(cust) < 0) state.customers.push(cust);
    } else {
      cust = custSel;
    }
    var prod = document.getElementById('in-prod').value;
    var qty = Math.max(1, parseInt(document.getElementById('in-qty').value,10) || 1);

    for(var i=1;i<=qty;i++){
      state.orders.push({
        id: 'o'+Date.now()+i+Math.random().toString(36).slice(2,6),
        seq: state.seq++, cust:cust, prod:prod, unit:i, col:'todo'
      });
    }

    document.getElementById('in-qty').value = '1';
    document.getElementById('in-newcust').value = '';
    document.getElementById('newcust-wrap').style.display = 'none';
    refreshCustOptions();
    document.getElementById('in-cust').value = cust;
    save(); render();
  });

  function setSort(mode){
    state.sortMode = mode;
    document.getElementById('btn-sort-prod').style.background = mode==='prod' ? 'var(--bg-secondary)' : 'var(--bg-primary)';
    document.getElementById('btn-sort-fifo').style.background = mode==='fifo' ? 'var(--bg-secondary)' : 'var(--bg-primary)';
    save(); render();
  }
  document.getElementById('btn-sort-prod').addEventListener('click', function(){ setSort('prod'); });
  document.getElementById('btn-sort-fifo').addEventListener('click', function(){ setSort('fifo'); });

  document.getElementById('btn-reset').addEventListener('click', function(){
    if(!confirm('ล้างข้อมูลทั้งหมด? การกระทำนี้ย้อนกลับไม่ได้')) return;
    state = {orders:[], seq:1, sortMode:'prod', customers:['อาจารย์ปู']};
    save();
    refreshCustOptions();
    document.getElementById('newcust-wrap').style.display = 'none';
    setSort('prod');
  });

  load();
  if(!state.orders){ state = {orders:[], seq:1, sortMode:'prod', customers:['อาจารย์ปู']}; }
  if(!state.sortMode) state.sortMode = 'prod';
  if(!state.customers || !state.customers.length) state.customers = ['อาจารย์ปู'];
  if(state.orders.length===0){
    var demo = [
      {cust:'อาจารย์ปู', prod:'CAR', unit:1, col:'done'},
      {cust:'อาจารย์ปู', prod:'CAR', unit:2, col:'doing'},
      {cust:'อาจารย์ปู', prod:'CAR', unit:3, col:'todo'},
      {cust:'อาจารย์ปู', prod:'CAR', unit:4, col:'todo'},
      {cust:'อาจารย์ปู', prod:'STORE', unit:1, col:'todo'},
      {cust:'อาจารย์ปู', prod:'STORE', unit:2, col:'todo'}
    ];
    demo.forEach(function(d){
      state.orders.push({
        id:'o'+Date.now()+Math.random().toString(36).slice(2,6),
        seq:state.seq++, cust:d.cust, prod:d.prod, unit:d.unit, col:d.col
      });
    });
    save();
  }
  refreshCustOptions();
  document.getElementById('btn-sort-prod').style.background = state.sortMode==='prod' ? 'var(--bg-secondary)' : 'var(--bg-primary)';
  document.getElementById('btn-sort-fifo').style.background = state.sortMode==='fifo' ? 'var(--bg-secondary)' : 'var(--bg-primary)';
  render();
})();
</script>
</body>
</html>
